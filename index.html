<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<style>
body{
font-family:Arial;
max-width:700px;
margin:40px auto;
}

#chat{
border:1px solid #ddd;
padding:20px;
height:400px;
overflow-y:auto;
margin-bottom:10px;
}

.user{
color:blue;
margin-bottom:10px;
}

.ai{
color:green;
margin-bottom:20px;
}

input{
width:80%;
padding:10px;
}

button{
padding:10px;
}
</style>
</head>

<body>

<h2>AI чат</h2>

<div id="chat"></div>

<input id="question" placeholder="Напиши вопрос">
<button onclick="ask()">Спросить</button>

<script>

async function ask(){

const input = document.getElementById("question");
const chat = document.getElementById("chat");

const question = input.value;

if(!question) return;

chat.innerHTML += `<div class="user">Ты: ${question}</div>`;

input.value="";

const response = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
question:question
})
});

const data = await response.json();

chat.innerHTML += `<div class="ai">AI: ${data.answer}</div>`;

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
